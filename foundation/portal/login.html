<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Bank — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0A1628; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

    .login-container { width: 100%; max-width: 420px; padding: 2rem; }

    .login-brand { text-align: center; margin-bottom: 2.5rem; }
    .login-brand a { text-decoration: none; color: #fff; font-size: 1.5rem; font-weight: 700; }
    .login-brand .accent { color: #00D4AA; }
    .login-brand p { color: rgba(255,255,255,.5); font-size: .85rem; margin-top: .5rem; }

    .login-card { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 2rem; }

    .login-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,.1); }
    .login-tab { flex: 1; padding: .65rem; text-align: center; font-size: .85rem; font-weight: 500; cursor: pointer; background: transparent; border: none; color: rgba(255,255,255,.5); transition: all .2s; }
    .login-tab.active { background: rgba(0,212,170,.15); color: #00D4AA; }
    .login-tab:hover:not(.active) { background: rgba(255,255,255,.05); }

    .login-title { font-size: 1.1rem; font-weight: 600; margin-bottom: .35rem; }
    .login-subtitle { font-size: .8rem; color: rgba(255,255,255,.45); margin-bottom: 1.5rem; }

    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: .8rem; font-weight: 500; color: rgba(255,255,255,.6); margin-bottom: .4rem; }
    .form-group input { width: 100%; padding: .7rem .9rem; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); border-radius: 8px; color: #fff; font-size: .9rem; font-family: inherit; outline: none; transition: border-color .2s; }
    .form-group input:focus { border-color: #00D4AA; }
    .form-group input::placeholder { color: rgba(255,255,255,.25); }

    .login-btn { width: 100%; padding: .75rem; background: #00D4AA; color: #0A1628; border: none; border-radius: 8px; font-size: .9rem; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: .5rem; transition: opacity .2s; }
    .login-btn:hover { opacity: .9; }
    .login-btn:disabled { opacity: .5; cursor: not-allowed; }

    .login-error { background: rgba(255,59,48,.1); border: 1px solid rgba(255,59,48,.3); color: #ff6b6b; padding: .6rem .8rem; border-radius: 8px; font-size: .8rem; margin-bottom: 1rem; display: none; }
    .login-error.show { display: block; }

    .login-footer { text-align: center; margin-top: 1.5rem; }
    .login-footer a { color: rgba(255,255,255,.4); font-size: .8rem; text-decoration: none; }
    .login-footer a:hover { color: #00D4AA; }

    .login-divider { display: flex; align-items: center; gap: .75rem; margin: 1.25rem 0; }
    .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.1); }
    .login-divider span { font-size: .75rem; color: rgba(255,255,255,.3); }

    .demo-btn { width: 100%; padding: .65rem; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 8px; color: rgba(255,255,255,.7); font-size: .85rem; font-family: inherit; cursor: pointer; transition: all .2s; }
    .demo-btn:hover { background: rgba(255,255,255,.1); color: #fff; }

    .login-btn-sso { width: 100%; padding: .85rem 1rem; background: #0A1628; color: #fff; border: 1px solid #00D4AA; border-radius: 8px; font-size: .9rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; justify-content: center; gap: .25rem; }
    .login-btn-sso:hover { background: #00D4AA; color: #0A1628; box-shadow: 0 4px 16px rgba(0,212,170,.25); }
    .login-btn-sso svg { color: inherit; }
    .sso-note { font-size: .75rem; color: rgba(255,255,255,.5); margin: .75rem 0 0; text-align: center; line-height: 1.5; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(10,22,40,.2); border-top-color: #0A1628; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-brand">
      <a href="/"><span class="accent">AI</span> Bank</a>
      <p>AI-Native Banking Platform</p>
    </div>

    <div class="login-card">
      <div class="login-tabs">
        <button class="login-tab active" id="tabCustomer" onclick="switchTab('customer')">Customer</button>
        <button class="login-tab" id="tabEmployee" onclick="switchTab('employee')">Employee</button>
      </div>

      <div id="customerPane">
        <div class="login-title">Customer Sign In</div>
        <div class="login-subtitle">Access your accounts, transactions, and AI assistant</div>
        <div class="login-error" id="customerError"></div>
        <form onsubmit="return loginCustomer(event)">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="custEmail" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="custPassword" placeholder="Enter your password" required autocomplete="current-password">
          </div>
          <button type="submit" class="login-btn" id="custBtn">Sign In</button>
        </form>
        <div class="login-divider"><span>or</span></div>
        <button class="demo-btn" onclick="demoLogin('customer')">⚡ Quick Demo — Instant Access</button>
      </div>

      <div id="employeePane" style="display:none">
        <div class="login-title">AI Bank Staff Portal</div>
        <div class="login-subtitle">Sign in with your corporate identity to access banking operations</div>
        <div class="login-error" id="employeeError"></div>
        <button class="login-btn login-btn-sso" onclick="ssoLogin()" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:8px"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
          Sign in with Corporate SSO
        </button>
        <p class="sso-note">Authenticated via IAM Identity Center using your Microsoft AD credentials</p>
        <script>
          async function ssoLogin() {
            try { await fetch('/sessions/me', {method:'DELETE', credentials:'include'}); } catch(e) {}
            window.location.href = 'https://aibank-employee.auth.eu-west-1.amazoncognito.com/oauth2/authorize?client_id=1po4o2jg5sso8221vpo7j27s9m&response_type=code&scope=openid+email+profile&redirect_uri=https://d1pfo41ge1bxh5.cloudfront.net/auth/callback.html&prompt=login&max_age=0&identity_provider=IdentityCenter&state=portal%3Demployee';
          }
        </script>
        <div class="login-divider"><span>or</span></div>
        <button class="demo-btn" onclick="demoLogin('employee')">⚡ Quick Demo — Instant Access</button>
      </div>
    </div>

    <div class="login-footer">
      <a href="/">← Back to AI Bank</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get('redirect') || '';
    const portal = params.get('portal') || 'customer';

    // Auto-select tab based on URL param
    if (portal === 'employee') switchTab('employee');

    function switchTab(tab) {
      document.getElementById('customerPane').style.display = tab === 'customer' ? '' : 'none';
      document.getElementById('employeePane').style.display = tab === 'employee' ? '' : 'none';
      document.getElementById('tabCustomer').classList.toggle('active', tab === 'customer');
      document.getElementById('tabEmployee').classList.toggle('active', tab === 'employee');
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading ? '<span class="spinner"></span>Signing in...' : 'Sign In';
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideError(id) {
      document.getElementById(id).classList.remove('show');
    }

    async function loginCustomer(e) {
      e.preventDefault();
      hideError('customerError');
      setLoading('custBtn', true);

      try {
        const resp = await fetch('/sessions/login', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('custEmail').value,
            password: document.getElementById('custPassword').value,
            portal: 'customer', country: 'BH',
          }),
        });
        const data = await resp.json();
        if (resp.ok && data.ok) {
          window.location.href = redirect || '/banking/dashboard.html';
        } else {
          showError('customerError', data.error || 'Sign in failed');
        }
      } catch {
        showError('customerError', 'Connection error. Please try again.');
      }
      setLoading('custBtn', false);
      return false;
    }

    async function loginEmployee(e) {
      e.preventDefault();
      hideError('employeeError');
      setLoading('empBtn', true);

      try {
        const resp = await fetch('/sessions/login', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('empEmail').value,
            password: document.getElementById('empPassword').value,
            portal: 'employee', country: 'BH',
          }),
        });
        const data = await resp.json();
        if (resp.ok && data.ok) {
          // Redirect to role-specific page
          const roleNav = {
            'loan-officer':   '/employee/credit/loan-queue.html',
            'rm':             '/employee/rm/portfolio.html',
            'risk-analyst':   '/employee/risk/data-analytics.html',
            'branch-manager': '/employee/rm/portfolio.html',
            'marketing':      '/employee/marketing/nba-analytics.html',
            'operations':     '/employee/dashboard.html',
            'admin':          '/employee/dashboard.html',
          };
          const me = await fetch('/sessions/me', { credentials: 'include' }).then(r => r.json()).catch(() => ({}));
          window.location.href = redirect || roleNav[me.role] || '/employee/dashboard.html';
        } else {
          showError('employeeError', data.error || 'Sign in failed');
        }
      } catch {
        showError('employeeError', 'Connection error. Please try again.');
      }
      setLoading('empBtn', false);
      return false;
    }

    async function demoLogin(portal) {
      try {
        const resp = await fetch('/sessions/demo', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ portal, role: portal, country: 'BH' }),
        });
        if (resp.ok) {
          const defaultRedirect = portal === 'employee' ? '/employee/dashboard.html' : '/banking/dashboard.html';
          window.location.href = redirect || defaultRedirect;
        }
      } catch {
        alert('Could not connect. Please try again.');
      }
    }
  </script>
</body>
</html>

  <style>
    .nb-content { max-width: 1600px; }

    .nba-hero {
      background: linear-gradient(135deg, var(--nb-primary) 0%, #0f2040 55%, #0a2a1e 100%);
      border-radius: var(--nb-radius); padding: var(--nb-space-lg) var(--nb-space-xl);
      color: white; margin-bottom: var(--nb-space-lg); position: relative; overflow: hidden;
    }
    .nba-hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 85% 20%, rgba(0,212,170,0.18), transparent 55%);
      pointer-events: none;
    }
    .nba-hero-content { position: relative; z-index: 1; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
    .nba-hero .icon {
      width: 52px; height: 52px; border-radius: 14px;
      background: linear-gradient(135deg, var(--nb-accent) 0%, #00b894 100%);
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
      flex-shrink: 0; color: var(--nb-primary);
      box-shadow: 0 4px 20px rgba(0,212,170,0.35);
    }
    .nba-hero h2 { font-size: 1.5rem; font-weight: 700; margin: 0 0 4px; }
    .nba-hero .sub { color: rgba(255,255,255,0.65); font-size: 0.85rem; margin: 0; }
    .nba-hero .attribution {
      display: inline-flex; align-items: center; gap: 8px; margin-top: 10px;
      padding: 4px 12px; background: rgba(0,212,170,0.15); border: 1px solid rgba(0,212,170,0.35);
      border-radius: 99px; font-size: 0.72rem; color: rgba(255,255,255,0.85); font-weight: 500;
    }
    .nba-hero .attribution .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--nb-accent); box-shadow: 0 0 6px var(--nb-accent); animation: nba-pulse 2s infinite; }
    @keyframes nba-pulse { 0%,100% { opacity:1 } 50% { opacity: 0.4 } }

    .nba-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: var(--nb-space-md); }
    .nba-chip {
      padding: 7px 14px; border-radius: 99px; font-size: 0.78rem; font-weight: 600;
      background: white; border: 1px solid var(--nb-border); color: var(--nb-text-secondary);
      cursor: pointer; transition: all 0.15s; user-select: none;
    }
    .nba-chip:hover { border-color: var(--nb-accent); color: var(--nb-accent); }
    .nba-chip.active { background: var(--nb-primary); border-color: var(--nb-primary); color: white; }
    .nba-chip .count { margin-left: 6px; opacity: 0.65; font-weight: 500; }
    .nba-chip.active .count { color: rgba(255,255,255,0.85); }

    .nba-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: var(--nb-space-md); }
    .nba-tile {
      background: var(--nb-card); border: 1px solid var(--nb-border); border-radius: var(--nb-radius);
      padding: var(--nb-space-lg); display: flex; flex-direction: column; gap: 12px;
      position: relative; transition: all 0.2s; overflow: hidden;
    }
    .nba-tile::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--cat-color, var(--nb-accent));
    }
    .nba-tile:hover { box-shadow: var(--nb-shadow-lg); transform: translateY(-1px); }
    .nba-tile-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .nba-cat-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 99px; font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      background: var(--cat-bg, #e5e7eb); color: var(--cat-color, #374151);
    }
    .nba-confidence {
      font-size: 0.68rem; color: var(--nb-text-muted); display: flex; align-items: center; gap: 4px;
    }
    .nba-tile h3 { font-size: 1.05rem; font-weight: 700; color: var(--nb-text-primary); margin: 0; line-height: 1.3; }
    .nba-reasoning {
      font-size: 0.82rem; color: var(--nb-text-secondary); line-height: 1.55; margin: 0;
      padding: 10px 12px; background: var(--nb-bg); border-radius: var(--nb-radius-sm);
      border-left: 2px solid var(--cat-color, var(--nb-accent));
    }
    .nba-reasoning::before { content: '💡 '; font-style: normal; }
    .nba-metrics {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-top: 4px;
    }
    .nba-metric {
      padding: 10px 12px; background: var(--nb-bg); border-radius: var(--nb-radius-sm);
    }
    .nba-metric .label { font-size: 0.66rem; color: var(--nb-text-muted); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
    .nba-metric .value { font-size: 1rem; font-weight: 700; color: var(--nb-text-primary); font-family: var(--nb-font-mono); margin-top: 2px; }
    .nba-actions { display: flex; gap: 8px; margin-top: auto; padding-top: 8px; }
    .nba-btn {
      flex: 1; padding: 10px 14px; border-radius: var(--nb-radius-sm); font-size: 0.82rem; font-weight: 600;
      text-decoration: none; text-align: center; cursor: pointer; border: none; transition: all 0.15s;
    }
    .nba-btn.primary { background: var(--nb-primary); color: white; }
    .nba-btn.primary:hover { background: #0d2137; transform: translateY(-1px); }
    .nba-btn.secondary { background: transparent; color: var(--nb-text-secondary); border: 1px solid var(--nb-border); }
    .nba-btn.secondary:hover { border-color: var(--nb-accent); color: var(--nb-accent); }

    /* Category color mapping — set as CSS vars for the tile */
    .cat-opportunity { --cat-color: #059669; --cat-bg: #d1fae5; }
    .cat-wellness    { --cat-color: #2563eb; --cat-bg: #dbeafe; }
    .cat-security    { --cat-color: #dc2626; --cat-bg: #fee2e2; }
    .cat-profile     { --cat-color: #7c3aed; --cat-bg: #ede9fe; }
    .cat-loyalty     { --cat-color: #d97706; --cat-bg: #fef3c7; }
    .cat-cross_sell  { --cat-color: #0891b2; --cat-bg: #cffafe; }

    .nba-empty { text-align: center; padding: 60px 20px; color: var(--nb-text-muted); grid-column: 1 / -1; }
    .nba-empty .icon-lg { font-size: 3rem; margin-bottom: 12px; }
    .nba-loading { grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--nb-text-muted); }

    @media (max-width: 600px) {
      .nba-hero-content { flex-direction: column; align-items: flex-start; }
    }
  </style>
  <style>
    /* === Premium Banking Design Tokens === */
    :root {
      --pb-space-3xs: 4px;
      --pb-space-2xs: 8px;
      --pb-space-xs: 12px;
      --pb-space-sm: 16px;
      --pb-space-md: 22px;
      --pb-space-lg: 32px;
      --pb-space-xl: 48px;
      --pb-radius-sm: 8px;
      --pb-radius-md: 12px;
      --pb-radius-lg: 18px;
      --pb-radius-pill: 999px;
      --pb-shadow-xs: 0 1px 2px rgba(0,0,0,.05);
      --pb-shadow-sm: 0 2px 8px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --pb-shadow-md: 0 8px 24px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
      --pb-shadow-lg: 0 18px 40px rgba(0,0,0,.10), 0 6px 12px rgba(0,0,0,.06);
      --pb-shadow-glow: 0 0 0 1px rgba(0,212,170,.15), 0 8px 28px rgba(0,212,170,.18);
      --pb-ease: cubic-bezier(.22,.61,.36,1);
      --pb-easing-spring: cubic-bezier(.34,1.56,.64,1);
      --pb-green: #16a34a; --pb-green-bg: rgba(22,163,74,.10); --pb-green-soft: rgba(22,163,74,.06);
      --pb-red: #dc2626; --pb-red-bg: rgba(220,38,38,.10); --pb-red-soft: rgba(220,38,38,.06);
      --pb-amber: #d97706; --pb-amber-bg: rgba(217,119,6,.10); --pb-amber-soft: rgba(217,119,6,.06);
      --pb-blue: #2563eb; --pb-blue-bg: rgba(37,99,235,.10); --pb-blue-soft: rgba(37,99,235,.06);
      --pb-purple: #7c3aed; --pb-purple-bg: rgba(124,58,237,.10);
      --pb-mono: 'JetBrains Mono','Fira Code','SF Mono',Menlo,monospace;
    }

    /* Page wrapper */
    .pb-page { width: 100%; max-width: 1600px; padding: 0 var(--pb-space-md) var(--pb-space-xl); }
    .pb-page-head { display:flex; justify-content:space-between; align-items:flex-end; gap:var(--pb-space-md); flex-wrap:wrap; margin-bottom:var(--pb-space-lg); }
    .pb-page-title { font-size: 1.75rem; font-weight: 800; letter-spacing:-0.02em; line-height:1.1; margin:6px 0 4px; color: var(--nb-text); }
    .pb-page-subtitle { font-size: 0.92rem; color: var(--nb-text-muted); margin: 0; font-weight:500; }

    /* Premium card */
    .pb-card { background: var(--nb-card); border: 1px solid var(--nb-border); border-radius: var(--pb-radius-md); box-shadow: var(--pb-shadow-xs); transition: box-shadow .25s var(--pb-ease), transform .25s var(--pb-ease); }
    .pb-card.pb-elevated { box-shadow: var(--pb-shadow-sm); }
    .pb-card.pb-hoverable:hover { box-shadow: var(--pb-shadow-md); transform: translateY(-2px); }
    .pb-card-pad { padding: var(--pb-space-md) var(--pb-space-md); }

    /* Hero (gradient banner) */
    .pb-hero { background: linear-gradient(135deg, #0A1628 0%, #0d2235 50%, #102d44 100%); color:#fff; padding: var(--pb-space-lg); border-radius: var(--pb-radius-lg); box-shadow: var(--pb-shadow-md); position:relative; overflow:hidden; }
    .pb-hero::before { content:''; position:absolute; top:-30%; right:-10%; width:300px; height:300px; background: radial-gradient(circle, rgba(0,212,170,.18) 0%, transparent 70%); pointer-events:none; }
    .pb-hero-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; opacity: 0.7; font-weight: 700; margin-bottom: var(--pb-space-2xs); position:relative; }
    .pb-hero-value { font-size: 2.6rem; font-weight: 800; letter-spacing: -0.025em; line-height:1; font-family: var(--pb-mono); position:relative; }
    .pb-hero-meta { display:flex; gap:var(--pb-space-md); margin-top:var(--pb-space-md); flex-wrap:wrap; font-size: 0.78rem; opacity: 0.85; position:relative; }
    .pb-hero-meta-item { display:flex; flex-direction:column; gap:2px; }
    .pb-hero-meta-item .v { font-weight:700; }

    /* KPI grid */
    .pb-kpi-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:var(--pb-space-xs); margin-bottom: var(--pb-space-md); }
    .pb-kpi { background: var(--nb-card); border: 1px solid var(--nb-border); border-radius: var(--pb-radius-md); padding: var(--pb-space-sm); position: relative; overflow:hidden; }
    .pb-kpi-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--nb-text-muted); font-weight: 700; margin-bottom: 4px; }
    .pb-kpi-value { font-size: 1.4rem; font-weight: 800; font-family: var(--pb-mono); letter-spacing: -0.01em; }
    .pb-kpi-trend { font-size: 0.74rem; margin-top: 6px; display:inline-flex; align-items:center; gap:4px; font-weight:600; }
    .pb-kpi.green .pb-kpi-value { color: var(--pb-green); }
    .pb-kpi.red .pb-kpi-value { color: var(--pb-red); }
    .pb-kpi.amber .pb-kpi-value { color: var(--pb-amber); }
    .pb-kpi.blue .pb-kpi-value { color: var(--pb-blue); }
    .pb-kpi.purple .pb-kpi-value { color: var(--pb-purple); }
    .pb-kpi-icon { position:absolute; top:14px; right:14px; opacity:.55; font-size: 1rem; }

    /* Section heading */
    .pb-section-head { display:flex; justify-content:space-between; align-items:center; margin: var(--pb-space-lg) 0 var(--pb-space-sm); gap:var(--pb-space-sm); flex-wrap:wrap; }
    .pb-section-title { font-size: 1.05rem; font-weight: 700; margin:0; }
    .pb-section-subtitle { font-size: 0.78rem; color: var(--nb-text-muted); margin: 2px 0 0; }
    .pb-section-link { color: var(--nb-accent); font-size: 0.82rem; font-weight: 600; text-decoration: none; }
    .pb-section-link:hover { text-decoration: underline; }

    /* Buttons */
    .pb-btn { display:inline-flex; align-items:center; justify-content:center; gap: 6px; padding: 10px 18px; border-radius: var(--pb-radius-sm); font-size: 0.85rem; font-weight: 700; font-family: inherit; cursor: pointer; border: 1px solid transparent; transition: all .15s var(--pb-ease); text-decoration: none; }
    .pb-btn-primary { background: var(--nb-accent); color: #0A1628; box-shadow: 0 1px 3px rgba(0,212,170,.25); }
    .pb-btn-primary:hover { background: #00bf99; box-shadow: 0 6px 16px rgba(0,212,170,.35); transform: translateY(-1px); }
    .pb-btn-secondary { background: rgba(255,255,255,.05); color: var(--nb-text); border-color: var(--nb-border); }
    .pb-btn-secondary:hover { background: rgba(255,255,255,.08); }
    .pb-btn-ghost { background: transparent; color: var(--nb-text-muted); }
    .pb-btn-ghost:hover { color: var(--nb-text); background: rgba(255,255,255,.04); }
    .pb-btn-danger { background: var(--pb-red); color: #fff; }
    .pb-btn-danger:hover { background: #b91c1c; transform: translateY(-1px); }

    /* Status chip */
    .pb-chip { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius: var(--pb-radius-pill); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em; text-transform:uppercase; }
    .pb-chip.green { background: var(--pb-green-bg); color: var(--pb-green); }
    .pb-chip.red { background: var(--pb-red-bg); color: var(--pb-red); }
    .pb-chip.amber { background: var(--pb-amber-bg); color: var(--pb-amber); }
    .pb-chip.blue { background: var(--pb-blue-bg); color: var(--pb-blue); }
    .pb-chip.neutral { background: rgba(255,255,255,.06); color: var(--nb-text-muted); }

    /* Form inputs */
    .pb-field { margin-bottom: var(--pb-space-sm); }
    .pb-field label { display:block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--nb-text-muted); margin-bottom: 6px; font-weight: 700; }
    .pb-input, .pb-select { width:100%; background: rgba(255,255,255,.04); border: 1px solid var(--nb-border); border-radius: var(--pb-radius-sm); padding: 11px 14px; color: var(--nb-text); font-size: 0.92rem; font-family: inherit; outline: none; transition: border-color .15s, box-shadow .15s; }
    .pb-input:focus, .pb-select:focus { border-color: var(--nb-accent); box-shadow: 0 0 0 3px rgba(0,212,170,.15); }
    .pb-input.pb-amount { font-family: var(--pb-mono); font-size: 1.05rem; font-weight: 700; }

    /* Skeleton loader */
    @keyframes pb-shimmer { 0% { background-position: -300px 0; } 100% { background-position: 300px 0; } }
    .pb-skel { background: linear-gradient(90deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.04) 100%); background-size: 600px 100%; animation: pb-shimmer 1.6s linear infinite; border-radius: 6px; height: 14px; }

    /* Account/transaction list rows */
    .pb-row { display:flex; align-items:center; justify-content:space-between; padding: 14px var(--pb-space-md); border-bottom: 1px solid var(--nb-border); gap: var(--pb-space-sm); transition: background .15s; }
    .pb-row:last-child { border-bottom: none; }
    .pb-row:hover { background: rgba(255,255,255,.025); }
    .pb-row-icon { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size: 1.05rem; flex-shrink:0; }
    .pb-row-icon.green { background: var(--pb-green-bg); color: var(--pb-green); }
    .pb-row-icon.red { background: var(--pb-red-bg); color: var(--pb-red); }
    .pb-row-icon.amber { background: var(--pb-amber-bg); color: var(--pb-amber); }
    .pb-row-icon.blue { background: var(--pb-blue-bg); color: var(--pb-blue); }
    .pb-row-icon.neutral { background: rgba(255,255,255,.05); color: var(--nb-text); }
    .pb-row-main { flex:1; min-width:0; }
    .pb-row-title { font-size: 0.92rem; font-weight: 600; color: var(--nb-text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pb-row-meta { font-size: 0.72rem; color: var(--nb-text-muted); margin-top: 2px; }
    .pb-row-amt { font-size: 1rem; font-weight: 700; font-family: var(--pb-mono); white-space:nowrap; flex-shrink:0; }

    /* Empty state */
    .pb-empty { padding: var(--pb-space-xl) var(--pb-space-md); text-align:center; color: var(--nb-text-muted); }
    .pb-empty-icon { font-size: 2.4rem; margin-bottom: var(--pb-space-2xs); opacity: 0.6; }
    .pb-empty-title { font-size: 0.95rem; font-weight: 700; color: var(--nb-text); margin-bottom: 4px; }
    .pb-empty-sub { font-size: 0.82rem; }

    /* Tabs */
    .pb-tabs { display:flex; gap: 0; border-bottom: 1px solid var(--nb-border); margin-bottom: var(--pb-space-md); }
    .pb-tab { background: none; border: none; padding: 12px 18px; font-size: 0.85rem; font-weight: 600; color: var(--nb-text-muted); cursor: pointer; border-bottom: 2px solid transparent; font-family: inherit; transition: all .15s; }
    .pb-tab.active { color: var(--nb-text); border-bottom-color: var(--nb-accent); }
    .pb-tab:hover:not(.active) { color: var(--nb-text); }

    /* Toast */
    @keyframes pb-toast-in { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .pb-toast { position: fixed; top: 20px; right: 20px; padding: 14px 22px; border-radius: var(--pb-radius-sm); color:#fff; font-weight: 600; z-index: 9999; box-shadow: var(--pb-shadow-lg); animation: pb-toast-in .3s var(--pb-easing-spring); font-size: 0.88rem; max-width: 340px; }
    .pb-toast.success { background: var(--pb-green); }
    .pb-toast.error { background: var(--pb-red); }
  </style>

      <!-- Daily Activity Sparkline -->
      <div class="nb-card" style="padding:16px 20px;margin-bottom:18px">

          <h3 style="font-size:0.88rem;font-weight:700;margin:0" id="chartTitle">Monthly Activity</h3>
          <div style="display:flex;gap:4px;background:rgba(255,255,255,0.04);border:1px solid var(--nb-border);border-radius:var(--pb-radius-pill);padding:3px" role="tablist">
            <button class="gran-pill" data-g="day" style="background:transparent;border:none;color:var(--nb-text-muted);padding:6px 14px;border-radius:var(--pb-radius-pill);font-size:0.74rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s">Daily</button>
            <button class="gran-pill" data-g="week" style="background:transparent;border:none;color:var(--nb-text-muted);padding:6px 14px;border-radius:var(--pb-radius-pill);font-size:0.74rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s">Weekly</button>
            <button class="gran-pill active" data-g="month" style="background:var(--nb-accent);color:#0A1628;border:none;padding:6px 14px;border-radius:var(--pb-radius-pill);font-size:0.74rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s">Monthly</button>
            <button class="gran-pill" data-g="quarter" style="background:transparent;border:none;color:var(--nb-text-muted);padding:6px 14px;border-radius:var(--pb-radius-pill);font-size:0.74rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s">Quarterly</button>
            <button class="gran-pill" data-g="halfyear" style="background:transparent;border:none;color:var(--nb-text-muted);padding:6px 14px;border-radius:var(--pb-radius-pill);font-size:0.74rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s">6 Months</button>
            <button class="gran-pill" data-g="year" style="background:transparent;border:none;color:var(--nb-text-muted);padding:6px 14px;border-radius:var(--pb-radius-pill);font-size:0.74rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s">Yearly</button>

      <!-- Transactions List -->
      <div class="nb-card" style="padding:0;overflow:hidden">
        <div style="padding:14px 20px;border-bottom:1px solid var(--nb-border);display:flex;justify-content:space-between;align-items:center">
          <h3 style="font-size:0.88rem;font-weight:700;margin:0">All Transactions</h3>
          <span id="resultCount" style="font-size:0.74rem;color:var(--nb-text-muted)"></span>
        </div>
        <div id="txnList"><div style="padding:24px;text-align:center;color:var(--nb-text-muted);font-size:0.85rem">Loading...</div></div>
      </div>

    <script>
      let allTxns = [];
      let myAccounts = [];
      let activeLoanTotal = 0;
      let activeLoanCount = 0;

      function fmtBhd(n) {
        const num = parseFloat(n) || 0;
        return Math.abs(num).toLocaleString('en', {minimumFractionDigits:3, maximumFractionDigits:3});
      }

      function fmtDate(s) {
        if (!s) return '—';
        try { return new Date(s + 'T00:00:00').toLocaleDateString('en-BH', {day:'2-digit', month:'short', year:'numeric'}); }
        catch { return s; }
      }

      function fmtDateInput(d) { return d.toISOString().slice(0,10); }

      function setDateRange(days) {
        if (days === 0) {
          document.getElementById('fromDate').value = '';
          document.getElementById('toDate').value = '';
          return;
        }
        const to = new Date();
        const from = new Date();
        from.setDate(from.getDate() - days);
        document.getElementById('fromDate').value = fmtDateInput(from);
        document.getElementById('toDate').value = fmtDateInput(to);
      }

      function renderStats(txns) {
        let credits = 0, debits = 0;
        txns.forEach(t => {
          const amt = Math.abs(parseFloat(t.amount) || 0);
          if (t.type === 'credit') credits += amt;
          else debits += amt;
        });
        const net = credits - debits;
        const stats = [
          { label: 'Total Credits',  value: fmtBhd(credits), color: '#16a34a', icon: '↓' },
          { label: 'Total Debits',   value: fmtBhd(debits),  color: '#dc2626', icon: '↑' },
          { label: 'Net Change',     value: (net >= 0 ? '+' : '−') + fmtBhd(net),
            color: net >= 0 ? '#16a34a' : '#dc2626',
            icon: net >= 0 ? '+' : '−' },
          { label: 'Transactions',   value: String(txns.length), color: 'var(--nb-accent)', icon: '#' },
          { label: `Outstanding Loans${activeLoanCount > 0 ? ' ('+activeLoanCount+')' : ''}`,
            value: fmtBhd(activeLoanTotal), color: '#d97706', icon: '⏚' },
        ];
        document.getElementById('statsCards').innerHTML = stats.map(s => `
          <div class="nb-card" style="padding:16px 18px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
              <span style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--nb-text-muted);font-weight:600">${s.label}</span>
              <span style="color:${s.color};font-weight:700;font-size:0.95rem">${s.icon}</span>
            </div>
            <div style="font-size:1.3rem;font-weight:800;color:${s.color};font-family:'JetBrains Mono',monospace">${s.value !== '0.000' && s.value !== '0' ? 'BHD ' : ''}${s.value}</div>
          </div>
        `).join('');
      }

      function renderChart(txns) {
        const gran = window._chartGran || 'month';
        const svg = document.getElementById('chart');
        const W = svg.clientWidth || 1100;
        const H = 200;
        svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
        if (!txns.length) {
          svg.innerHTML = `<text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#888" font-size="13">No transactions in this period</text>`;
          document.getElementById('chartLegend').textContent = '';
          return;
        }

        // Bucketing helpers
        const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        function bucketKey(dateStr) {
          if (!dateStr) return null;
          const d = new Date(dateStr + 'T00:00:00');
          if (isNaN(d.getTime())) return null;
          const y = d.getFullYear();
          const m = d.getMonth() + 1;
          const day = d.getDate();
          if (gran === 'day')      return { key: dateStr, label: `${day} ${monthNames[m-1]}`, sortable: dateStr };
          if (gran === 'week') {
            // ISO-ish: week starts Sunday, label as "MMM dd"
            const dow = d.getDay();
            const start = new Date(d); start.setDate(d.getDate() - dow);
            const k = start.toISOString().slice(0,10);
            return { key: k, label: `Wk ${monthNames[start.getMonth()]} ${start.getDate()}`, sortable: k };
          }
          if (gran === 'month')    return { key: `${y}-${String(m).padStart(2,'0')}`, label: `${monthNames[m-1]} ${String(y).slice(-2)}`, sortable: `${y}-${String(m).padStart(2,'0')}` };
          if (gran === 'quarter') {
            const q = Math.floor((m-1)/3) + 1;
            return { key: `${y}-Q${q}`, label: `Q${q} ${y}`, sortable: `${y}-${q}` };
          }
          if (gran === 'halfyear') {
            const h = m <= 6 ? 'H1' : 'H2';
            return { key: `${y}-${h}`, label: `${h} ${y}`, sortable: `${y}-${h}` };
          }
          if (gran === 'year')     return { key: String(y), label: String(y), sortable: String(y) };
          return null;
        }

        const buckets = {};
        const labels = {};
        txns.forEach(t => {
          const b = bucketKey(t.date);
          if (!b) return;
          if (!buckets[b.key]) { buckets[b.key] = { credit:0, debit:0, count:0, sortable:b.sortable }; labels[b.key] = b.label; }
          const amt = Math.abs(parseFloat(t.amount) || 0);
          buckets[b.key].count++;
          if (t.type === 'credit') buckets[b.key].credit += amt;
          else buckets[b.key].debit += amt;
        });

        const keys = Object.keys(buckets).sort((a,b) => buckets[a].sortable.localeCompare(buckets[b].sortable));
        if (!keys.length) {
          svg.innerHTML = `<text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#888" font-size="13">No data for this view</text>`;
          return;
        }
        const maxVal = Math.max(...keys.map(k => Math.max(buckets[k].credit, buckets[k].debit)));
        if (maxVal === 0) {
          svg.innerHTML = `<text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#888" font-size="13">No activity in this period</text>`;
          return;
        }

        const padding = 50;
        const labelGutter = 30;
        const chartW = W - padding * 2;
        const chartH = H - labelGutter - 20;
        const groupW = chartW / keys.length;
        const barW = Math.max(3, Math.min(48, groupW * 0.35));

        let svgContent = `
          <defs>
            <linearGradient id="grdCredit" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#22c55e" stop-opacity="1"/>
              <stop offset="100%" stop-color="#16a34a" stop-opacity="0.7"/>
            </linearGradient>
            <linearGradient id="grdDebit" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ef4444" stop-opacity="1"/>
              <stop offset="100%" stop-color="#dc2626" stop-opacity="0.7"/>
            </linearGradient>
          </defs>
        `;

        // Y-axis grid
        for (let i = 1; i <= 4; i++) {
          const y = chartH - (chartH / 4) * i + 10;
          const val = (maxVal / 4) * i;
          svgContent += `<line x1="${padding}" y1="${y}" x2="${W - padding}" y2="${y}" stroke="#e2e8f0" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="2,4"/>`;
          svgContent += `<text x="${padding - 6}" y="${y + 3}" fill="#94a3b8" font-size="9" text-anchor="end" font-family="JetBrains Mono,monospace">${val >= 1000 ? (val/1000).toFixed(1)+'K' : val.toFixed(0)}</text>`;
        }
        svgContent += `<line x1="${padding}" y1="${chartH + 10}" x2="${W - padding}" y2="${chartH + 10}" stroke="#475569" stroke-width="1.5"/>`;

        // Decide whether to show every label or skip some when too dense
        const labelEvery = Math.max(1, Math.ceil(keys.length / 12));

        keys.forEach((k, i) => {
          const xCenter = padding + i * groupW + groupW / 2;
          const ch = (buckets[k].credit / maxVal) * chartH;
          const dh = (buckets[k].debit / maxVal) * chartH;
          const xCredit = xCenter - barW - 2;
          const xDebit = xCenter + 2;

          svgContent += `<rect x="${xCredit}" y="${chartH + 10 - ch}" width="${barW}" height="${ch}" fill="url(#grdCredit)" rx="3"><title>${labels[k]}: +BHD ${buckets[k].credit.toFixed(3)} (${buckets[k].count} txns)</title></rect>`;
          svgContent += `<rect x="${xDebit}" y="${chartH + 10 - dh}" width="${barW}" height="${dh}" fill="url(#grdDebit)" rx="3"><title>${labels[k]}: −BHD ${buckets[k].debit.toFixed(3)} (${buckets[k].count} txns)</title></rect>`;

          // Value labels (only if bar is large enough and we have room)
          if (barW >= 18) {
            if (buckets[k].credit > maxVal * 0.05) {
              svgContent += `<text x="${xCredit + barW/2}" y="${chartH + 10 - ch - 4}" fill="#16a34a" font-size="9" text-anchor="middle" font-weight="700" font-family="JetBrains Mono,monospace">${buckets[k].credit >= 1000 ? (buckets[k].credit/1000).toFixed(1)+'K' : buckets[k].credit.toFixed(0)}</text>`;
            }
            if (buckets[k].debit > maxVal * 0.05) {
              svgContent += `<text x="${xDebit + barW/2}" y="${chartH + 10 - dh - 4}" fill="#dc2626" font-size="9" text-anchor="middle" font-weight="700" font-family="JetBrains Mono,monospace">${buckets[k].debit >= 1000 ? (buckets[k].debit/1000).toFixed(1)+'K' : buckets[k].debit.toFixed(0)}</text>`;
            }
          }

          if (i % labelEvery === 0 || i === keys.length - 1) {
            svgContent += `<text x="${xCenter}" y="${H - 4}" fill="#94a3b8" font-size="10" text-anchor="middle" font-weight="600">${labels[k]}</text>`;
          }
        });

        svg.innerHTML = svgContent;
        const totalC = Object.values(buckets).reduce((s,v)=>s+v.credit,0);
        const totalD = Object.values(buckets).reduce((s,v)=>s+v.debit,0);
        const granLabels = { day:'days', week:'weeks', month:'months', quarter:'quarters', halfyear:'half-years', year:'years' };
        document.getElementById('chartLegend').innerHTML = `<span style="color:#16a34a">● Credits BHD ${totalC.toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:0})}</span> &nbsp;·&nbsp; <span style="color:#dc2626">● Debits BHD ${totalD.toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:0})}</span> &nbsp;·&nbsp; ${keys.length} ${granLabels[gran]||'periods'}`;
        const titleLabels = { day:'Daily Activity', week:'Weekly Activity', month:'Monthly Activity', quarter:'Quarterly Activity', halfyear:'Half-Yearly Activity', year:'Yearly Activity' };
        document.getElementById('chartTitle').textContent = titleLabels[gran] || 'Activity';
      }

      function categoryIcon(t) {
        const desc = (t.description || '').toLowerCase();
        if (desc.includes('loan')) return '💰';
        if (desc.includes('transfer')) return '🔄';
        if (desc.includes('insurance')) return '🛡️';
        if (desc.includes('grocer') || desc.includes('lulu') || desc.includes('carrefour')) return '🛒';
        if (desc.includes('shop') || desc.includes('zara') || desc.includes('city centre')) return '🛍️';
        if (desc.includes('uber') || desc.includes('taxi') || desc.includes('transport')) return '🚗';
        if (desc.includes('food') || desc.includes('restaur') || desc.includes('cafe')) return '🍽️';
        if (desc.includes('entertain') || desc.includes('funland')) return '🎉';
        if (desc.includes('salary') || desc.includes('payroll')) return '💼';
        return t.type === 'credit' ? '↓' : '↑';
      }

      function renderList(txns) {
        const list = document.getElementById('txnList');
        document.getElementById('resultCount').textContent = `${txns.length} transaction${txns.length !== 1 ? 's' : ''}`;
        if (!txns.length) {
          list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--nb-text-muted);font-size:0.88rem">No transactions match your filters</div>';
          return;
        }
        // Group by date
        const byDate = {};
        txns.forEach(t => {
          const d = t.date || 'Unknown';
          if (!byDate[d]) byDate[d] = [];
          byDate[d].push(t);
        });

        const html = Object.keys(byDate).map(date => {
          const dailyCredits = byDate[date].filter(t => t.type==='credit').reduce((s,t) => s + Math.abs(parseFloat(t.amount)||0), 0);
          const dailyDebits = byDate[date].filter(t => t.type!=='credit').reduce((s,t) => s + Math.abs(parseFloat(t.amount)||0), 0);
          return `
            <div style="padding:8px 20px;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--nb-border);display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:0.74rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--nb-text-muted)">${fmtDate(date)}</span>
              <span style="font-size:0.72rem;color:var(--nb-text-muted)">
                ${dailyCredits > 0 ? `<span style="color:#16a34a">+${fmtBhd(dailyCredits)}</span>` : ''}
                ${dailyCredits > 0 && dailyDebits > 0 ? ' / ' : ''}
                ${dailyDebits > 0 ? `<span style="color:#dc2626">−${fmtBhd(dailyDebits)}</span>` : ''}
              </span>
            </div>
          ` + byDate[date].map(t => {
            const isCredit = t.type === 'credit';
            const absAmt = Math.abs(parseFloat(t.amount) || 0);
            return `
              <div style="padding:14px 20px;border-bottom:1px solid var(--nb-border);display:flex;justify-content:space-between;align-items:center;gap:12px;transition:background 0.15s" onmouseenter="this.style.background='rgba(255,255,255,0.03)'" onmouseleave="this.style.background='transparent'">
                <div style="display:flex;align-items:center;gap:14px;flex:1;min-width:0">
                  <div style="width:38px;height:38px;border-radius:50%;background:${isCredit ? 'rgba(22,163,74,0.1)' : 'rgba(220,38,38,0.08)'};color:${isCredit ? '#16a34a' : '#dc2626'};display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0">${categoryIcon(t)}</div>
                  <div style="flex:1;min-width:0">
                    <div style="font-size:0.9rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.description || 'Transaction'}</div>
                    <div style="font-size:0.72rem;color:var(--nb-text-muted);margin-top:2px">
                      ${t.account_id || '—'}
                      ${t.transaction_id ? ` · <code style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--nb-text-muted)">${t.transaction_id}</code>` : ''}
                    </div>
                  </div>
                </div>
                <div style="text-align:right;flex-shrink:0">
                  <div style="font-size:1rem;font-weight:700;color:${isCredit ? '#16a34a' : '#dc2626'};font-family:'JetBrains Mono',monospace">${isCredit ? '+' : '−'}BHD ${absAmt.toFixed(3)}</div>
                  ${t.balance_after !== undefined && t.balance_after !== null ? `<div style="font-size:0.7rem;color:var(--nb-text-muted);margin-top:2px">Balance: BHD ${parseFloat(t.balance_after).toFixed(3)}</div>` : ''}
                </div>
              </div>
            `;
          }).join('');
        }).join('');

        list.innerHTML = html;
      }

      async function loadAccounts() {
        try {
          const r = await fetch('/sessions/me/accounts', { credentials: 'include' });
          if (r.status === 401) { location.href = '/login.html'; return; }
          const d = await r.json();
          myAccounts = d.accounts || [];
          const sel = document.getElementById('accountFilter');
          myAccounts.forEach(a => {
            const opt = new Option(`${a.account_id} — ${(a.account_type || '').replace(/_/g,' ')}`, a.account_id);
            sel.add(opt);
          });
        } catch (e) {}
      }

      async function loadTransactions() {
        const params = new URLSearchParams();
        params.set('limit', '500');
        const fd = document.getElementById('fromDate').value;
        const td = document.getElementById('toDate').value;
        const acc = document.getElementById('accountFilter').value;
        const tp = document.getElementById('typeFilter').value;
        const sq = document.getElementById('searchInput').value.trim();
        if (fd) params.set('from_date', fd);
        if (td) params.set('to_date', td);
        if (acc) params.set('account_id', acc);
        if (tp) params.set('type', tp);
        if (sq) params.set('search', sq);

        document.getElementById('txnList').innerHTML = '<div style="padding:24px;text-align:center;color:var(--nb-text-muted);font-size:0.85rem">Loading...</div>';
        try {
          const r = await fetch('/sessions/me/transactions?' + params.toString(), { credentials: 'include' });
          if (r.status === 401) { location.href = '/login.html'; return; }
          const d = await r.json();
          allTxns = d.transactions || [];
          renderStats(allTxns);
          renderChart(allTxns);
          renderList(allTxns);
        } catch (e) {
          document.getElementById('txnList').innerHTML = `<div style="padding:24px;text-align:center;color:#dc2626">Error: ${e.message}</div>`;
        }
      }

      // Quick range pills
      document.querySelectorAll('.range-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.range-pill').forEach(b => {
            b.style.background = 'rgba(255,255,255,0.04)';
            b.style.borderColor = 'var(--nb-border)';
            b.style.color = 'var(--nb-text-muted)';
            b.classList.remove('active');
          });
          btn.classList.add('active');
          btn.style.background = 'rgba(0,212,170,0.1)';
          btn.style.borderColor = 'var(--nb-accent)';
          btn.style.color = 'var(--nb-accent)';
          setDateRange(parseInt(btn.dataset.days));
          loadTransactions();
        });
      });

      // Filter change handlers
      ['fromDate','toDate','accountFilter','typeFilter'].forEach(id => {
        document.getElementById(id).addEventListener('change', loadTransactions);
      });
      let searchTimer;
      document.getElementById('searchInput').addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(loadTransactions, 350);
      });

      // Export CSV
      document.getElementById('exportBtn').addEventListener('click', () => {
        if (!allTxns.length) { alert('Nothing to export'); return; }
        const headers = ['Date','Account','Type','Amount BHD','Description','Transaction ID','Balance After'];
        const rows = allTxns.map(t => [
          t.date || '',
          t.account_id || '',
          t.type || '',
          (parseFloat(t.amount) || 0).toFixed(3),
          (t.description || '').replace(/"/g,'""'),
          t.transaction_id || '',
          (t.balance_after !== undefined ? parseFloat(t.balance_after).toFixed(3) : ''),
        ]);
        const csv = [headers, ...rows].map(r => r.map(c => `"${c}"`).join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `transactions-${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      });

      async function loadLoans() {
        try {
          const r = await fetch('/sessions/me/loans', { credentials: 'include' });
          if (!r.ok) return;
          const d = await r.json();
          const loans = d.loans || [];
          const active = loans.filter(l => ['approved','disbursed'].includes((l.status || '').toLowerCase()));
          activeLoanTotal = active.reduce((s, l) => s + (parseFloat(l.amount) || 0), 0);
          activeLoanCount = active.length;
          // Re-render stats if txns already loaded
          if (allTxns.length || activeLoanCount) renderStats(allTxns);
        } catch (e) {}
      }

      // Granularity pill handlers
      window._chartGran = 'month';
      document.querySelectorAll('.gran-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.gran-pill').forEach(b => {
            b.classList.remove('active');
            b.style.background = 'transparent';
            b.style.color = 'var(--nb-text-muted)';
            b.style.fontWeight = '600';
          });
          btn.classList.add('active');
          btn.style.background = 'var(--nb-accent)';
          btn.style.color = '#0A1628';
          btn.style.fontWeight = '700';
          window._chartGran = btn.dataset.g;
          renderChart(allTxns);
        });
      });

      // Init: default last 30 days
      setDateRange(30);
      loadAccounts();
      loadLoans();
      loadTransactions();
    </script>
  </main>
</div>

<script>
  // ── Rendering primitives ────────────────────────────────────────────────

  const fmtBHD = (v) => {
    const n = typeof v === 'number' ? v : parseFloat(v || 0);
    if (!n || isNaN(n)) return null;
    return 'BHD ' + n.toLocaleString('en-US', { minimumFractionDigits: 3, maximumFractionDigits: 3 });
  };

  const CAT_LABEL = {
    opportunity: 'Opportunity',
    wellness: 'Wellness',
    security: 'Security',
    profile: 'Profile',
    loyalty: 'Loyalty',
    cross_sell: 'Product',
  };

  function renderTile(a) {
    const cat = a.category || 'opportunity';
    const metricsHtml = (a.metrics || []).filter(m => m.value != null && m.value !== '').map(m =>
      `<div class="nba-metric"><div class="label">${m.label}</div><div class="value">${m.value}</div></div>`
    ).join('');
    const confidenceHtml = a.confidence != null
      ? `<div class="nba-confidence">✨ ${Math.round(a.confidence * 100)}% match</div>` : '';
    const actionedHtml = a.actioned
      ? `<div class="nba-actioned-badge">✅ Action Completed</div>` : '';
    const primaryCta = a.cta_primary || { label: 'Chat with Alma', action: 'alma', prompt: `Tell me more about ${a.title}` };
    const secondaryCta = a.cta_secondary;
    return `
      <div class="nba-tile cat-${cat}" data-cat="${cat}" data-action-id="${a.id || ''}">
        <div class="nba-tile-head">
          <span class="nba-cat-badge">${CAT_LABEL[cat] || cat}</span>
          ${confidenceHtml}
          ${actionedHtml}
        </div>
        <h3>${a.title}</h3>
        ${a.reasoning ? `<p class="nba-reasoning">${a.reasoning}</p>` : ''}
        ${metricsHtml ? `<div class="nba-metrics">${metricsHtml}</div>` : ''}
        <div style="text-align:right;margin-bottom:4px"><a href="#" class="nba-why-link" onclick="showExplain('${a.id}', event)" style="display:inline-flex;align-items:center;gap:4px;font-size:0.75rem;font-weight:600;color:var(--nb-accent);text-decoration:none;padding:4px 10px;border:1px solid var(--nb-accent);border-radius:99px;transition:all 0.15s" onmouseover="this.style.background='var(--nb-accent)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='var(--nb-accent)'">💡 Why this?</a></div>
        <div class="nba-actions">
          <button class="nba-btn primary" onclick='handleCta(${JSON.stringify(primaryCta).replace(/'/g, "&apos;")})'>
            ${primaryCta.label}
          </button>
          ${secondaryCta ? `<button class="nba-btn secondary" onclick='handleCta(${JSON.stringify(secondaryCta).replace(/'/g, "&apos;")})'>${secondaryCta.label}</button>` : ''}
        </div>
      </div>`;
  }

  window.handleCta = (cta) => {
    if (!cta) return;
    if (cta.action === 'alma') {
      const prompt = encodeURIComponent(cta.prompt || '');
      window.location.href = '/banking/alma-chat.html?prompt=' + prompt;
    } else if (cta.action === 'navigate' && cta.url) {
      window.location.href = cta.url;
    } else if (cta.action === 'dismiss') {
      // Client-side dismiss (backend-backed later)
      alert('Thanks for your feedback — we\'ll refine future recommendations.');
    }
  };

  function applyFilter(activeCat) {
    document.querySelectorAll('.nba-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.cat === activeCat);
    });
    const tiles = document.querySelectorAll('.nba-tile');
    let visible = 0;
    tiles.forEach(t => {
      const show = activeCat === 'all' || t.dataset.cat === activeCat;
      t.style.display = show ? '' : 'none';
      if (show) visible++;
    });
    const grid = document.getElementById('nbaGrid');
    let empty = grid.querySelector('.nba-empty');
    if (visible === 0 && !empty) {
      empty = document.createElement('div');
      empty.className = 'nba-empty';
      empty.innerHTML = `<div class="icon-lg">📭</div><div>No actions in this category right now.</div>`;
      grid.appendChild(empty);
    } else if (empty) {
      empty.remove();
    }
  }

  document.querySelectorAll('.nba-chip').forEach(chip => {
    chip.addEventListener('click', () => applyFilter(chip.dataset.cat));
  });

  // ── Data adapters — swap this function when the NBA backend is ready ─────

  /**
   * Forward-compatible loader.
   *
   * Future state: call GET /sessions/me/actions and return the response's
   * `actions[]` array directly (each item already in NBA shape).
   *
   * Current state: pull offers + accounts + loans and synthesise NBAs
   * client-side so the page is usable before the proper NBA engine exists.
   */
  async function loadActions(profile) {
    // Call the real NBA API endpoint (backed by next_best_actions table)
    try {
      const resp = await fetch('/sessions/me/actions', { credentials: 'include' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      const actions = (data.actions || []).map(a => ({
        id: a.action_id,
        category: a.category || 'opportunity',
        title: a.title || 'Recommendation',
        reasoning: a.reasoning || '',
        confidence: a.confidence || 0.8,
        metrics: a.metrics || [],
        cta_primary: a.cta_primary || { label: 'Learn More', action: 'alma', prompt: `Tell me about ${a.title}` },
        cta_secondary: a.cta_secondary || { label: 'Not now', action: 'dismiss' },
        actioned: a.actioned || false,
        template_id: a.template_id || '',
      }));
      return actions;
    } catch (e) {
      console.warn('NBA API unavailable:', e.message);
      return []; // No fallback — show empty state if API fails
    }
  }


  

  // TEMPORARY: generate NBAs from the customer's real data.
  // Remove this when GET /sessions/me/actions returns a full NBA list.
  

  // ── Page bootstrap ───────────────────────────────────────────────────────

  window.logout = async () => {
    try { await fetch('/sessions/me', { method: 'DELETE', credentials: 'include' }); } catch {}
    window.location.href = '/login.html';
  };

  (async () => {
    let profile = { name: 'Customer', accounts: [], loans: [], kyc_status: '' };
    try {
      const [r1, r2] = await Promise.all([
        fetch('/sessions/me', { credentials: 'include' }),
        fetch('/sessions/me/accounts', { credentials: 'include' }),
      ]);
      if (r1.status === 401) { window.location.href = '/login.html'; return; }
      const s = await r1.json();
      profile.name = s.given_name || s.name || 'Customer';
      const initials = profile.name.split(/\s+/).map(x => x[0]).join('').slice(0, 2).toUpperCase();
      document.getElementById('avatarInitials').textContent = initials;
      document.getElementById('sidebarName').textContent = profile.name;
      document.getElementById('headerGreeting').textContent = `Hi, ${profile.name.split(' ')[0]}`;
      document.getElementById('nbaHeroSub').textContent = `Recommended actions for ${profile.name.split(' ')[0]}, refined by your activity`;

      if (r2.ok) {
        const d = await r2.json();
        profile.accounts = d.accounts || [];
        profile.loans = d.loans || [];
        profile.kyc_status = d.kyc_status || '';
      }
    } catch (e) {
      console.warn('profile fetch failed', e);
    }

    try {
      const actions = await loadActions(profile);
      const grid = document.getElementById('nbaGrid');

      if (actions.length === 0) {
        grid.innerHTML = `<div class="nba-empty">
          <div class="icon-lg">✨</div>
          <div>No recommendations right now. Check back soon.</div>
        </div>`;
      } else {
        grid.innerHTML = actions.map(renderTile).join('');
      }

      // Update category counts
      const counts = { all: actions.length };
      actions.forEach(a => { counts[a.category] = (counts[a.category] || 0) + 1; });
      Object.entries(counts).forEach(([k, v]) => {
        const el = document.getElementById(`cnt-${k}`);
        if (el) el.textContent = v;
      });

      // Hide chips for empty categories
      document.querySelectorAll('.nba-chip').forEach(c => {
        const cat = c.dataset.cat;
        if (cat !== 'all' && !counts[cat]) c.style.display = 'none';
      });

      document.getElementById('nbaUpdated').textContent = 'Updated just now';
    } catch (e) {
      document.getElementById('nbaGrid').innerHTML =
        `<div class="nba-empty"><div class="icon-lg">⚠️</div><div>Failed to load recommendations: ${e.message}</div></div>`;
    }
  })();

  // === NBA Event Tracking (view/click/dismiss) ===
  function trackEvent(actionId, event, extra = {}) {
    fetch('/sessions/me/actions/' + actionId + '/event', {
      method: 'POST', credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({event, channel: 'in_app', ...extra})
    }).catch(() => {});
  }

  // Track views via IntersectionObserver
  const viewObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.dataset.actionId;
        if (id && !e.target.dataset.viewed) {
          e.target.dataset.viewed = '1';
          trackEvent(id, 'viewed');
        }
      }
    });
  }, {threshold: 0.5});

  // Observe all NBA tiles after render
  setTimeout(() => {
    document.querySelectorAll('.nba-tile[data-action-id]').forEach(t => viewObserver.observe(t));
  }, 1000);

  // Override handleCta to track clicks
  const _origHandleCta = window.handleCta;
  window.handleCta = (cta) => {
    const tile = event?.target?.closest?.('.nba-tile');
    const actionId = tile?.dataset?.actionId;
    if (actionId) {
      if (cta?.action === 'dismiss') {
        trackEvent(actionId, 'dismissed', {dismiss_reason: 'not_now'});
        // Mark as dismissed via API then remove from DOM
        fetch(`/sessions/me/actions/${actionId}/event`, {
          method: 'POST', credentials: 'include',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({event: 'dismissed', dismiss_reason: 'not_now'})
        });
        tile.style.opacity = '0';
        setTimeout(() => tile.remove(), 300);
      } else {
        trackEvent(actionId, 'clicked');
      }
    }
    if (_origHandleCta) _origHandleCta(cta);
  };

</script>

  <!-- Explain overlay -->
  <div class="explain-overlay" id="explainOverlay" onclick="if(event.target===this)closeExplain()">
    <div class="explain-panel" id="explainPanel">
      <button class="explain-close" onclick="closeExplain()">✕</button>

  <script>
  async function showExplain(actionId, evt) {
    evt.preventDefault();
    const overlay = document.getElementById('explainOverlay');
    const content = document.getElementById('explainContent');
    overlay.classList.add('open');
    content.innerHTML = '<p style="color:var(--nb-text-muted)">Loading explanation...</p>';

    try {
      const resp = await fetch(`/sessions/me/actions/${actionId}/explain`, {credentials:'include'});
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      document.getElementById('explainTitle').textContent = `Why: ${data.title}`;

      let html = '';

      // Layer 2: Your profile
      // Template-specific reasoning (unique per NBA)
      html += `<div class="explain-section"><h4>💡 Why did we recommend this?</h4>`;
      html += `<p style="line-height:1.6;color:var(--nb-text-primary)">${data.reasoning}</p>`;
      if (data.metrics && data.metrics.length > 0) {
        html += `<ul style="margin-top:8px">`;
        data.metrics.forEach(m => { html += `<li>${m.label}: <strong>${m.value}</strong></li>`; });
        html += `</ul>`;
      }
      html += `</div>`;

      // Peer insights section (from Neptune graph)
      const peerInsights = [];
      const rText = data.reasoning || '';
      const m1 = rText.match(/Among the (\d+) customers? with similar[^]*?(?:products|coverage|insurance|loans|features)[^.]*\./i);
      if (m1) peerInsights.push(m1[0]);
      const m2 = rText.match(/community of (\d+) customers[^.]*\./i);
      if (m2) peerInsights.push(m2[0]);
      const m3 = rText.match(/([\d.]+)% (?:of similar|have explored|of customers)[^.]*\./i);
      if (m3 && !m1) peerInsights.push(m3[0]);
      if (data.metrics) {
        data.metrics.forEach(m => {
          const l = (m.label||'').toLowerCase();
          if ((l.includes('peer') || l.includes('community') || l.includes('adoption')) && m.value)
            peerInsights.push(m.label + ': ' + m.value);
        });
      }
      if (peerInsights.length > 0) {
        html += `<div class="explain-section"><h4>👥 Customers like you</h4><ul style="margin:0;padding-left:16px">`;
        peerInsights.forEach(p => { html += `<li style="margin:4px 0;font-size:0.85rem;line-height:1.5">${p}</li>`; });
        html += `</ul></div>`;
      }

      // FHS context (secondary)
      if (data.financial_health?.score) {
        const ss = data.financial_health.subscores || {};
        const entries = Object.entries(ss).filter(e => typeof e[1] === 'number');
        const weakest = entries.length ? entries.sort((a,b)=>a[1]-b[1])[0] : ['?',0];
        html += `<div class="explain-section"><h4>💪 Your Financial Health</h4>`;
        html += `<p>Score: <strong>${data.financial_health.score}/100</strong> (${data.financial_health.band})</p>`;
        html += `<p style="font-size:0.8rem;color:var(--nb-text-muted)">Tip: improving <strong>${weakest[0]}</strong> (${weakest[1]}/100) would unlock more recommendations.</p>`;
        html += `</div>`;
      }

      // Eligibility rules that matched — handle ALL rule types
      if (data.eligibility_rules) {
        const rules = data.eligibility_rules;
        const reasons = [];
        if (rules.min_income_bhd) reasons.push(`Your income meets the BHD ${rules.min_income_bhd} threshold`);
        if (rules.min_fhs) reasons.push(`Your Financial Health Score (${data.financial_health?.score || '?'}) meets the ≥${rules.min_fhs} requirement`);
        if (rules.min_tenure_months) reasons.push(`You've been banking with us for ≥${rules.min_tenure_months} months`);
        if (rules.min_balance_bhd) reasons.push(`Your balance exceeds BHD ${rules.min_balance_bhd}`);
        if (rules.requires_preference_false) reasons.push(`You haven't enabled ${rules.requires_preference_false.replace(/_/g, ' ')} yet`);
        if (rules.min_recurring_subscriptions) reasons.push(`You have ${rules.min_recurring_subscriptions}+ recurring subscriptions detected`);
        if (rules.requires_life_event) reasons.push(`Triggered by a detected life event: ${rules.requires_life_event}`);
        if (rules.trigger) reasons.push(`Triggered by: ${rules.trigger.replace(/_/g, ' ').replace('txn.', '')}`);
        if (rules.exclude_if_has_product) reasons.push(`You don't already have a ${rules.exclude_if_has_product.replace(/_/g, ' ')}`);
        if (rules.exclude_if_has_goal) reasons.push(`No existing ${rules.exclude_if_has_goal.replace(/_/g, ' ')} goal found`);
        if (rules.suppress_after_dismiss_days) reasons.push(`Not previously dismissed in the last ${rules.suppress_after_dismiss_days} days`);
        // If no specific rules matched, show a generic reason
        if (reasons.length === 0) reasons.push('This recommendation is relevant based on your overall financial profile');

        html += `<div class="explain-section"><h4>✅ Why you qualify</h4><ul>`;
        reasons.forEach(r => { html += `<li>${r}</li>`; });
        html += `</ul></div>`;
      }

      // Generation info
      html += `<div class="explain-section"><h4>⏱️ How & when</h4>`;
      html += `<p>Generated: ${data.generation?.generated_at || 'Recently'}</p>`;
      html += `<p>Method: ${data.generation?.source === 'rule' ? 'Batch analysis (refreshed every 6 hours)' : 'Real-time (triggered by your activity)'}</p>`;
      html += `<p>AI model: ${data.generation?.model || 'AI Bank Alma'}</p>`;
      html += `</div>`;

      // Activity log
      if (data.activity_log?.length > 0) {
        html += `<div class="explain-section"><h4>📋 Activity</h4><div class="explain-activity">`;
        data.activity_log.forEach(a => {
          html += `<div class="evt">${a.timestamp} — ${a.event}${a.reason ? ' ('+a.reason+')' : ''}</div>`;
        });
        html += `</div></div>`;
      }

      // Controls — duration-based suppression (REAL, not an alert)
      html += `<div class="explain-section"><h4>⚙️ Your controls</h4>`;
      html += `<p style="font-size:0.82rem;color:var(--nb-text-muted);margin:0 0 10px">Don't show ${data.category} recommendations for:</p>`;
      html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
                 <button class="supp-btn" onclick="suppressCategory('${data.category}', 30, 'not_interested')">30 days</button>
                 <button class="supp-btn" onclick="suppressCategory('${data.category}', 180, 'not_interested')">6 months</button>
                 <button class="supp-btn" onclick="suppressCategory('${data.category}', null, 'not_interested')">Indefinitely</button>
               </div>`;
      html += `<p style="font-size:0.78rem;color:var(--nb-text-muted);margin:0">
                 You can re-enable them anytime from <a href="/banking/preferences.html" style="color:var(--nb-accent)">Manage preferences</a>.
               </p>`;
      html += `</div>`;

      content.innerHTML = html;

      // Track that user viewed the explanation
      trackEvent(actionId, 'viewed');
    } catch(e) {
      content.innerHTML = `<p style="color:var(--nb-danger)">Could not load explanation: ${e.message}</p>`;
    }
  }

  function closeExplain() {
    document.getElementById('explainOverlay').classList.remove('open');
  }

  function suppressCategory(category, durationDays, reason) {
    // Real suppression via session API. duration_days=null means indefinite.
    const body = { scope_type: 'category', scope_value: category, reason: reason || 'not_interested', source: 'explain_panel' };
    if (durationDays) body.duration_days = durationDays;

    fetch('/sessions/me/nba-preferences', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    }).then(async r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      closeExplain();
      // Remove NBA cards of this category from the DOM immediately
      document.querySelectorAll(`.nba-tile[data-cat="${category}"]`).forEach(el => el.remove());
      // Refresh the banner
      loadSuppressions();
      // Lightweight toast
      const toast = document.createElement('div');
      toast.textContent = durationDays
        ? `${category} recommendations hidden for ${durationDays} days`
        : `${category} recommendations hidden indefinitely`;
      toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:10px 18px;border-radius:22px;z-index:500;font-size:0.85rem;box-shadow:0 4px 16px rgba(0,0,0,0.2)';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }).catch(e => {
      alert('Could not update preferences: ' + e.message);
    });
  }

  // Suppression banner bootstrap — runs on page load, shows banner if any active
  async function loadSuppressions() {
    try {
      const r = await fetch('/sessions/me/nba-preferences', { credentials: 'include' });
      if (!r.ok) return;
      const data = await r.json();
      const active = data.active_suppressions || [];
      const banner = document.getElementById('suppressionBanner');
      const summary = document.getElementById('suppBannerSummary');
      if (!banner || !summary) return;
      if (active.length === 0) {
        banner.style.display = 'none';
        return;
      }
      const cats = active.filter(s => s.scope_type === 'category').map(s => s.scope_value);
      const tmpls = active.filter(s => s.scope_type === 'template').map(s => s.scope_value);
      const parts = [];
      if (cats.length) parts.push(`${cats.length} ${cats.length === 1 ? 'category' : 'categories'} (${cats.join(', ')})`);
      if (tmpls.length) parts.push(`${tmpls.length} ${tmpls.length === 1 ? 'specific recommendation' : 'specific recommendations'}`);
      summary.textContent = `You've hidden ${parts.join(' and ')}.`;
      banner.style.display = 'block';
    } catch(e) { /* silent */ }
  }
  // Kick off the suppression check after the main page has loaded
  window.addEventListener('DOMContentLoaded', loadSuppressions);
  </script>

</body>
</html>
